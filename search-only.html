<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DOT Alliance | Find a DOT Provider</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <!-- Find Provider Search Section Only -->
      <section class="section find-provider-section" id="find-provider">
        <div class="container">
          <div class="section-header">
            <h2 style="margin: 0 0 0.75rem; font-size: clamp(2rem, 4vw, 2.75rem); font-weight: 800; letter-spacing: -0.02em;">
              <span class="logo-ez">EZ</span><span class="logo-physicals">Physicals</span>
            </h2>
            <p style="margin: 0 0 1.25rem; font-size: 1.05rem; color: var(--white-muted);">
              Fast, Best Price, No Nonsense, Driver Friendly DOT Physicals. Locations Nationwide.
            </p>
            <span class="eyebrow">Find a Provider</span>
            <h2>Locate a DOT Provider Near You</h2>
            <p class="section-subtitle">Enter your city or zip code to find the closest FMCSA-certified provider</p>
          </div>

          <div class="search-box">
            <div class="search-input-wrapper">
              <input
                type="text"
                id="location-search"
                placeholder="Enter city, state, or zip code..."
                autocomplete="off"
              />
              <button id="search-btn" class="search-btn">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                >
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="m21 21-4.35-4.35"></path>
                </svg>
                Search
              </button>
            </div>
            <button id="use-location-btn" class="use-location-btn">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M12 2v4m0 12v4M2 12h4m12 0h4"></path>
              </svg>
              Use My Current Location
            </button>
          </div>

          <div id="results-container" class="results-container">
            <!-- Results will appear here -->
          </div>

          <div id="all-locations" class="all-locations">
            <h3>Provider Locations</h3>
            <div id="all-locations-grid" class="locations-grid"></div>
          </div>
        </div>
      </section>
    </div>

    <script src="locations.js"></script>
    <script src="zipcodes.js"></script>
    <script src="search.js"></script>
  </body>
</html>
